<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Catálogo de Productos</title>

<style>

body{
    font-family: Arial, sans-serif;
    background-color: #dff5df;
    text-align: center;
}

h2{
    color: darkgreen;
}

.carrito{
    background-color: green;
    color: white;
    text-decoration: none;
    padding: 10px;
}

.tabla{
    margin: auto;
    border-collapse: collapse;
    width: 80%;
    background-color: white;
}

.tabla th,
.tabla td{
    border: 1px solid black;
    padding: 10px;
}

.tabla th{
    background-color: lightgreen;
}

.btn{
    background-color: green;
    color: white;
    border: none;
    padding: 10px;
    margin-top: 15px;
    cursor: pointer;
}

</style>

</head>

<body>

<h2>Catálogo de Productos</h2>

<br>

<a href="carrito.html" class="carrito">
    🛒 Carrito (0)
</a>

<br><br>

<table class="tabla">

    <tr>
        <th>Producto</th>
        <th>Descripción</th>
        <th>Precio</th>
    </tr>

    <tr>
        <td>Lámpara Solar</td>
        <td>Iluminación con energía solar</td>
        <td>$500</td>
    </tr>

    <tr>
        <td>Cargador Solar</td>
        <td>Recarga dispositivos con energía renovable</td>
        <td>$800</td>
    </tr>

    <tr>
        <td>Panel Solar Escolar</td>
        <td>Ideal para proyectos educativos</td>
        <td>$1500</td>
    </tr>

</table>

<br>

<a href="index.html">
    <button class="btn">Volver al inicio</button>
</a>

</body>
</html>
